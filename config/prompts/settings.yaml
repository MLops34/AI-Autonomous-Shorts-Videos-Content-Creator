
# config/prompts/settings.yaml
# Global settings for the Shorts pipeline.
# (Currently informational only; wiring into code can be added later.)

general:
  resolution: [1080, 1920]          # width, height → vertical 9:16
  fps: 30
  zoom_factor: 0.02                 # gentle Ken Burns zoom per image (0 = no zoom)

openrouter:
  model: "deepseek/deepseek-chat"   # change to the DeepSeek model id you use on OpenRouter
  temperature: 0.35
  max_tokens: 2048

tts:
  voice: "en-US-GuyNeural"          # good neutral male voice
  # Alternatives: en-US-AriaNeural, en-GB-SoniaNeural, en-IN-PrabhatNeural, etc.
  rate: "+0%"                       # speed adjustment: +0% = normal, +10% faster, -10% slower

mermaid:
  theme: "dark"
  background: "transparent"
  width: 1080
  scale: 2.0                        # higher = sharper but larger file

video:
  background_color: [18, 18, 38]    # dark blue-gray for padding
  preset: "medium"                  # MoviePy encoding preset: ultrafast, veryfast, medium, slow
  threads: 4

directories:
  outputs_base: "outputs"
  prompts_folder: "config/prompts"